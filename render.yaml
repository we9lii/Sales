services:
  - type: web
    name: solar-crm-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solar-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
